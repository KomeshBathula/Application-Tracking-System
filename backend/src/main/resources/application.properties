# Server Port Configuration
server.port=${PORT:8080}

# Database Connection (MySQL)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3308/ats_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:ats_user}
spring.datasource.password=${DB_PASSWORD:ats_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Configuration
# Secret key must be a 64-character (256-bit) hex-encoded string
app.jwt.secret=${JWT_SECRET:9a4f2c8d3b7a1e5f8g2h6k9l0m3n6o8p1q4r7s2t5u8v1w4x7y0z3a6b9c2d5e8f}
app.jwt.expiration-ms=86400000

# CORS Allowed Origins
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# Swagger / OpenAPI Properties
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha

# File Upload Directory
ats.upload.dir=${ATS_UPLOAD_DIR:./uploads/resumes}
