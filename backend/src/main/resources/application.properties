# Server Port Configuration
server.port=${PORT:8080}

# Database Connection (MySQL)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3308/ats_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:ats_user}
spring.datasource.password=${DB_PASSWORD:ats_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Configuration
# Secret key must be a 64-character (256-bit) hex-encoded string
app.jwt.secret=${JWT_SECRET:9a4f2c8d3b7a1e5f8g2h6k9l0m3n6o8p1q4r7s2t5u8v1w4x7y0z3a6b9c2d5e8f}
app.jwt.expiration-ms=86400000

# CORS Allowed Origins
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:5174}


# Swagger / OpenAPI Properties
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha

# File Upload Directory
ats.upload.dir=${ATS_UPLOAD_DIR:./uploads/resumes}

# Email Notification Server Configuration
spring.mail.host=${SMTP_HOST:localhost}
spring.mail.port=${SMTP_PORT:1025}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS:false}
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Recruiter Sender Config: Set to true to send directly from Recruiter email (requires open SMTP relay).
# If false, sends from system email with Recruiter display name and routes replies to Recruiter.
ats.mail.use-recruiter-as-from=${USE_RECRUITER_AS_FROM:false}

# The display sender email (e.g. noreply@ats-recruiter.com)
ats.mail.from-email=${ATS_FROM_EMAIL:noreply@ats-recruiter.com}

# Spring AI Configuration
# Auto-configuration is disabled: we build per-tenant OpenAI clients dynamically at runtime using tenant-specific API keys.
spring.ai.openai.api-key=${OPENAI_API_KEY:sk-placeholder}
spring.ai.openai.enabled=false


